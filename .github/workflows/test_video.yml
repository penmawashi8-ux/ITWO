name: Test Video Generation

on:
  workflow_dispatch:
    inputs:
      term:
        description: '用語を指定（空欄で自動選定）'
        required: false
        default: ''

jobs:
  test-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Start VOICEVOX engine
        run: |
          docker run -d --rm \
            -p 50021:50021 \
            voicevox/voicevox_engine:cpu-ubuntu20.04-latest
          sleep 15

      - name: Run pipeline (TEST MODE)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VOICEVOX_URL: http://localhost:50021
          TEST_MODE: "true"
          FORCE_TERM: ${{ github.event.inputs.term }}
        run: python main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-video-${{ github.run_number }}
          path: |
            output/final.mp4
            output/script.json
            output/slide_*.png
          retention-days: 7

      - name: Show generated script
        run: cat output/script.json
